<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SunvenTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="bg-grid"></div>

  <a href="index.html" class="go-back">← Back to Home</a>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/logofinal.png" alt="SunvenTech" />
        <span>SunvenTech</span>
      </div>

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="forgot-link">
          <a href="reset-password.html" class="auth-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" style="width:100%; justify-content:center;">
          Sign In →
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account?
        <a href="register.html" class="auth-link">Create one</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      btn.textContent = "Signing in…";
      btn.disabled = true;
      setTimeout(() => { btn.textContent = "Sign In →"; btn.disabled = false; }, 2000);
    });
  </script>
</body>
</html>
