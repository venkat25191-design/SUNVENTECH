<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | SunvenTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="bg-grid"></div>

  <a href="login.html" class="go-back">← Back to Login</a>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/logofinal.png" alt="SunvenTech" />
        <span>SunvenTech</span>
      </div>

      <h2>Create account</h2>
      <p class="subtitle">Join SunvenTech today</p>

      <form id="registerForm">
        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" placeholder="John" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" placeholder="Doe" required />
          </div>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a strong password" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Repeat your password" required autocomplete="new-password" />
        </div>

        <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
          Create Account →
        </button>
      </form>

      <p class="auth-footer">
        Already have an account?
        <a href="login.html" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      btn.textContent = "Creating account…";
      btn.disabled = true;
      setTimeout(() => { btn.textContent = "Create Account →"; btn.disabled = false; }, 2000);
    });
  </script>
</body>
</html>
