<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | SunvenTech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="bg-grid"></div>

  <a href="login.html" class="go-back">← Back to Login</a>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/logofinal.png" alt="SunvenTech" />
        <span>SunvenTech</span>
      </div>

      <h2>Reset password</h2>
      <p class="subtitle">Enter your email and we'll send a reset link</p>

      <form id="resetForm">
        <div class="form-group">
          <label>Email address</label>
          <input type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
          Send Reset Link →
        </button>
      </form>

      <p class="auth-footer">
        Remembered it?
        <a href="login.html" class="auth-link">Back to sign in</a>
      </p>
    </div>
  </div>

  <script>
    document.getElementById("resetForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      const original = btn.textContent;
      btn.textContent = "Sending…";
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = "Reset link sent ✓";
        btn.style.background = "linear-gradient(135deg, #10b981, #059669)";
        setTimeout(() => {
          btn.textContent = original;
          btn.style.background = "";
          btn.disabled = false;
          e.target.reset();
        }, 3000);
      }, 1200);
    });
  </script>
</body>
</html>
